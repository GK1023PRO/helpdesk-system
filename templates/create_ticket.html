<!DOCTYPE html>
<html>
<head>
    <title>Create Ticket - Help Desk</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="/">🎫 Help Desk</a>
        <div>
            <span class="text-white me-3">👤 {{ current_user.username }}</span>
            <a href="/logout" class="btn btn-outline-light btn-sm">Logout</a>
        </div>
    </div>
</nav>

<div class="container mt-4" style="max-width: 600px;">
    <div class="card shadow">
        <div class="card-body p-4">
            <h2 class="mb-4">🎫 Create New Ticket</h2>

            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        <div class="alert alert-{{ category }}">{{ message }}</div>
                    {% endfor %}
                {% endif %}
            {% endwith %}

            <form method="POST">
                <div class="mb-3">
                    <label class="form-label">Title</label>
                    <input type="text" name="title" class="form-control"
                           placeholder="e.g. Cannot connect to VPN" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Description</label>
                    <textarea name="description" class="form-control" rows="4"
                              placeholder="Describe the issue in detail..." required></textarea>
                </div>
                <div class="mb-3">
                    <label class="form-label">Priority</label>
                    <select name="priority" class="form-select">
                        <option value="Low">🟢 Low</option>
                        <option value="Medium" selected>🟡 Medium</option>
                        <option value="High">🔴 High</option>
                    </select>
                </div>
                <button type="submit" class="btn btn-primary">Submit Ticket</button>
                <a href="/" class="btn btn-secondary ms-2">Cancel</a>
            </form>

        </div>
    </div>
</div>

</body>
</html>
